services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 5s
      retries: 5
    ports: 
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db:/docker-entrypoint-initdb.d

  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow
    environment:
      - PYTHONPATH=/app
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${AF_DB}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - BASE_URL=${BASE_URL}
      - API_KEY=${API_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      postgres:
        condition: service_healthy
    ports: 
      - "8080:8080"
    command: airflow standalone

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    container_name: streamlit
    environment:
      - PYTHONPATH=/app
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - API_KEY=${API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports: 
      - "8501:8501"

volumes:
  pgdata: